```
<h1>🌡 ROOM MONITORING DASHBOARD</h1>

<div class="container">

    <div class="card">
        <h2>Temperature</h2>
        <div class="value" id="temp">--</div>
    </div>

    <div class="card">
        <h2>Humidity</h2>
        <div class="value" id="humid">--</div>
    </div>

    <div class="card">
        <h2>MQTT Status</h2>
        <div class="status disconnected" id="status">
            Disconnected
        </div>
        <div id="updateTime">
            Last Update: --
        </div>
    </div>

</div>

<div class="chart-container">
    <canvas id="sensorChart"></canvas>
</div>

<script>

    let tempData = [];
    let humidData = [];
    let labels = [];

    const ctx =
        document.getElementById("sensorChart")
        .getContext("2d");

    const chart = new Chart(ctx,{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {
                    label:'Temperature (°C)',
                    data:tempData,
                    borderColor:'red',
                    tension:0.3
                },
                {
                    label:'Humidity (%)',
                    data:humidData,
                    borderColor:'cyan',
                    tension:0.3
                }
            ]
        },
        options:{
            responsive:true,
            scales:{
                y:{
                    beginAtZero:true
                }
            }
        }
    });

    // =====================
    // MQTT CONNECT
    // =====================

    const client =
        mqtt.connect(
            'wss://broker.hivemq.com:8884/mqtt'
        );

    client.on('connect', () => {

        console.log("MQTT Connected");

        document
            .getElementById("status")
            .innerHTML = "Connected";

        document
            .getElementById("status")
            .className =
            "status connected";

        client.subscribe("iot_python/room/temperature");
        client.subscribe("iot_python/room/humidity");

    });

    client.on('error', () => {

        document
            .getElementById("status")
            .innerHTML =
            "Disconnected";

        document
            .getElementById("status")
            .className =
            "status disconnected";

    });

    let currentTemp = null;
    let currentHumid = null;

    client.on('message',
        (topic, message) => {

        const value =
            parseFloat(
                message.toString()
            );

        if(topic === "iot_python/room/temperature"){

            currentTemp = value;

            document
                .getElementById("temp")
                .innerHTML =
                value.toFixed(1) + " °C";

            if(value >= 35){

                document
                    .getElementById("temp")
                    .style.color =
                    "red";

            }else{

                document
                    .getElementById("temp")
                    .style.color =
                    "#00ffd5";
            }
        }

        if(topic === "iot_python/room/humidity"){

            currentHumid = value;

            document
                .getElementById("humid")
                .innerHTML =
                value.toFixed(1) + " %";
        }

        if(
            currentTemp !== null &&
            currentHumid !== null
        ){

            const now =
                new Date()
                .toLocaleTimeString();

            document
                .getElementById("updateTime")
                .innerHTML =
                "Last Update: " + now;

            labels.push(now);
            tempData.push(currentTemp);
            humidData.push(currentHumid);

            if(labels.length > 20){

                labels.shift();
                tempData.shift();
                humidData.shift();
            }

            chart.update();
        }

    });

</script>
